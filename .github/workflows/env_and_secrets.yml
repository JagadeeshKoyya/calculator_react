name: environments and secrets demo
on:
    workflow_dispatch:
    push:

env:
    node_version: '20'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download NodeJs
        uses: actions/setup-node@v4
        with:
            version: ${{ env.node_version }}

      - name: Cache dependency
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: dependency-build-${{ hashFiles('**/package-lock.json')}}

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

